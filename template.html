<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>okiedoke</title>
<style>
  :root {
    --text: #0f1419;
    --text-2: #536471;
    --border: #eff3f4;
    --border-media: #cfd9de;
    --blue: #1d9bf0;
    --pink: #f91880;
    --green: #00ba7c;
    --hover: rgba(15, 20, 25, 0.03);
    --chip-bg: #eff3f4;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "TwitterChirp", -apple-system, BlinkMacSystemFont, "Segoe UI",
      Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    background: #fff;
    font-size: 15px;
    line-height: 1.3125;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .shell {
    max-width: 600px;
    margin: 0 auto;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    min-height: 100vh;
  }

  /* ---- sticky header ---- */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 20;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .topbar .title-row {
    padding: 10px 16px 4px;
  }
  .topbar h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.2px;
  }
  .topbar .sub {
    font-size: 13px;
    color: var(--text-2);
  }
  .controls {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px 10px;
    flex-wrap: wrap;
  }
  .searchbox {
    flex: 1 1 180px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--chip-bg);
    border: 1px solid transparent;
    border-radius: 9999px;
    padding: 8px 14px;
  }
  .searchbox:focus-within {
    background: #fff;
    border-color: var(--blue);
  }
  .searchbox svg { flex: none; fill: var(--text-2); width: 16px; height: 16px; }
  .searchbox input {
    border: none;
    outline: none;
    background: transparent;
    font: inherit;
    font-size: 14px;
    width: 100%;
    color: var(--text);
  }
  .chip {
    font: inherit;
    font-size: 13.5px;
    font-weight: 700;
    color: var(--text);
    background: #fff;
    border: 1px solid var(--border-media);
    border-radius: 9999px;
    padding: 6px 14px;
    cursor: pointer;
  }
  .chip:hover { background: var(--hover); }
  select.chip { appearance: none; -webkit-appearance: none; padding-right: 24px;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6"><path d="M0 0l5 6 5-6z" fill="%23536471"/></svg>');
    background-repeat: no-repeat; background-position: right 10px center; }
  .shown { font-size: 13px; color: var(--text-2); margin-left: auto; }

  /* tag multiselect dropdown */
  .tagdrop { position: relative; }
  .tagdrop summary { list-style: none; display: inline-block; }
  .tagdrop summary::-webkit-details-marker { display: none; }
  .tagdrop summary::after { content: " ▾"; color: var(--text-2); }
  .tagdrop[open] summary::after { content: " ▴"; }
  .tagmenu {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    z-index: 30;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 0 15px rgba(101, 119, 134, 0.2), 0 0 5px rgba(101, 119, 134, 0.15);
    padding: 8px 0;
    max-height: 420px;
    overflow-y: auto;
    min-width: 300px;
  }
  .tagmenu label {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
  }
  .tagmenu label:hover { background: var(--hover); }
  .tagmenu .cnt { color: var(--text-2); margin-left: auto; font-size: 12.5px; }
  .tagmenu input { accent-color: var(--blue); }

  /* boolean filter menu */
  #tagSummary.on { color: var(--blue); max-width: 190px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; }
  .fbar { display: flex; align-items: center; gap: 6px; padding: 10px 12px 6px; }
  .fexpr {
    flex: 1; min-width: 0; font: inherit; font-size: 13.5px; color: var(--text);
    border: 1px solid var(--border-media); border-radius: 9px; padding: 7px 10px; outline: none;
  }
  .fexpr:focus { border-color: var(--blue); }
  .fexpr.bad { border-color: #f4212e; }
  .fx {
    flex: none; border: none; background: var(--chip-bg); color: var(--text-2);
    border-radius: 9999px; width: 24px; height: 24px; cursor: pointer; font-size: 15px; line-height: 1;
  }
  .fx:hover { background: var(--hover); }
  .ferr { color: #f4212e; font-size: 12px; padding: 0 13px 4px; }
  .fsave { display: flex; gap: 6px; padding: 2px 12px 8px; }
  .fname {
    flex: 1; min-width: 0; font: inherit; font-size: 13px; color: var(--text);
    border: 1px solid var(--border-media); border-radius: 9px; padding: 6px 9px; outline: none;
  }
  .fname:focus { border-color: var(--blue); }
  .fsavebtn {
    flex: none; font: inherit; font-size: 13px; font-weight: 700; color: #fff;
    background: var(--blue); border: none; border-radius: 9999px; padding: 6px 14px; cursor: pointer;
  }
  .fsavebtn:hover { background: #1a8cd8; }
  .saved { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 12px 8px; }
  .sf { display: inline-flex; align-items: center; background: var(--chip-bg); border-radius: 9999px; }
  .sfapply {
    font: inherit; font-size: 12.5px; font-weight: 700; color: var(--text);
    background: none; border: none; padding: 5px 4px 5px 11px; cursor: pointer;
  }
  .sfdel {
    background: none; border: none; color: var(--text-2); cursor: pointer;
    padding: 5px 9px 5px 3px; font-size: 13px; line-height: 1;
  }
  .sfdel:hover { color: #f4212e; }
  .fdiv { font-size: 12px; color: var(--text-2); padding: 6px 14px; border-top: 1px solid var(--border); }
  .fdiv b { color: var(--text); font-weight: 700; }
  .palette { max-height: 220px; overflow-y: auto; }
  .prow { display: flex; align-items: center; gap: 8px; padding: 5px 14px; white-space: nowrap; }
  .prow:hover { background: var(--hover); }
  .pbtn {
    flex: none; font: inherit; font-weight: 800; font-size: 13px; line-height: 1;
    width: 22px; height: 22px; border-radius: 9999px; cursor: pointer;
    border: 1px solid var(--border-media); background: #fff; color: var(--text-2);
  }
  .pbtn.add:hover { background: #e8f5fe; border-color: var(--blue); color: var(--blue); }
  .pbtn.ex:hover { background: #fdeaec; border-color: #f4212e; color: #f4212e; }
  .pname { font-size: 14px; }
  .palette .cnt { color: var(--text-2); margin-left: auto; font-size: 12.5px; }

  /* ---- manage-tags modal ---- */
  .tm-backdrop {
    position: fixed; inset: 0; z-index: 60;
    background: rgba(15, 20, 25, 0.4);
    display: flex; align-items: flex-start; justify-content: center;
    padding: 6vh 16px;
  }
  .tm {
    background: #fff; border-radius: 18px; width: 100%; max-width: 520px;
    max-height: 88vh; display: flex; flex-direction: column;
    box-shadow: 0 0 24px rgba(101, 119, 134, 0.35);
    overflow: hidden;
  }
  .tm-head { display: flex; align-items: center; padding: 16px 18px 10px; }
  .tm-head h2 { font-size: 20px; font-weight: 800; }
  .tm-x {
    margin-left: auto; border: none; background: var(--chip-bg); color: var(--text);
    width: 32px; height: 32px; border-radius: 9999px; cursor: pointer; font-size: 20px; line-height: 1;
  }
  .tm-x:hover { background: var(--hover); }
  .tm-note { padding: 0 18px 10px; font-size: 13px; color: var(--text-2); }
  .tm-tabs { display: flex; gap: 6px; padding: 2px 18px 10px; }
  .tm-tab {
    font: inherit; font-size: 14px; font-weight: 700; color: var(--text-2);
    background: var(--chip-bg); border: none; border-radius: 9999px; padding: 7px 16px; cursor: pointer;
  }
  .tm-tab:hover { background: var(--hover); }
  .tm-tab.on { background: var(--blue); color: #fff; }
  .tm-search {
    margin: 0 18px 8px; font: inherit; font-size: 15px; color: var(--text);
    border: 1px solid var(--border-media); border-radius: 10px; padding: 9px 12px; outline: none;
  }
  .tm-search:focus { border-color: var(--blue); }
  .tm-summary { padding: 0 18px 8px; font-size: 12.5px; color: var(--text-2); }
  .tm-list { overflow-y: auto; padding: 0 8px 12px; }
  .tm-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 10px;
  }
  .tm-row:hover { background: var(--hover); }
  .tm-row.deleted .tm-pill { opacity: 0.5; text-decoration: line-through; }
  .tm-pill {
    font-size: 13.5px; font-weight: 600; border-radius: 9999px; padding: 4px 12px;
    max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .tm-cnt { font-size: 12.5px; color: var(--text-2); margin-left: auto; white-space: nowrap; }
  .tm-act {
    font: inherit; font-size: 13px; font-weight: 700; border-radius: 9999px;
    padding: 6px 14px; cursor: pointer; border: 1px solid var(--border-media); white-space: nowrap;
  }
  .tm-act.delete { background: #fff; color: #f4212e; border-color: #f4212e; }
  .tm-act.delete:hover { background: #fdeaec; }
  .tm-act.restore { background: var(--blue); color: #fff; border-color: var(--blue); }
  .tm-act.restore:hover { background: #1a8cd8; }
  .tm-empty { padding: 24px 18px; text-align: center; color: var(--text-2); font-size: 14px; }

  /* ---- tweet card ---- */
  article.tweet {
    display: flex;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    /* Skip layout/paint for off-screen cards — the browser only renders what's
       near the viewport, so a 500-card timeline paints like a handful. The
       `auto` size is remembered per card after first scroll to keep the
       scrollbar honest. */
    content-visibility: auto;
    contain-intrinsic-size: auto 220px;
  }
  article.tweet:hover { background: var(--hover); }
  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 9999px;
    object-fit: cover;
    flex: none;
    background: var(--chip-bg);
  }
  .avatar-fallback {
    width: 40px; height: 40px; border-radius: 9999px; flex: none;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 18px;
  }
  .content { flex: 1; min-width: 0; }
  .head {
    display: flex;
    align-items: baseline;
    gap: 4px;
    min-width: 0;
  }
  .head .name {
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 45%;
    flex: none;
  }
  .head .name:hover { text-decoration: underline; }
  .head .handle, .head .dot, .head .time {
    color: var(--text-2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .head .time { flex: none; }
  .head .time:hover { text-decoration: underline; color: var(--text-2); }
  .del {
    margin-left: auto;
    flex: none;
    border: none;
    background: transparent;
    color: var(--text-2);
    border-radius: 9999px;
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    align-self: center;
  }
  .del:hover { background: rgba(244, 33, 46, 0.1); color: #f4212e; }
  .del svg { width: 17px; height: 17px; fill: currentColor; }

  .replying { color: var(--text-2); font-size: 14px; margin-top: 2px; }
  .body {
    margin-top: 2px;
    white-space: pre-wrap;
    overflow-wrap: break-word;
    word-break: break-word;
  }
  .body.clamped {
    display: -webkit-box;
    -webkit-line-clamp: 8;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .showmore {
    display: inline-block;
    margin-top: 4px;
    color: var(--blue);
    cursor: pointer;
    font-size: 15px;
  }
  .showmore:hover { text-decoration: underline; }

  /* media grid */
  .media {
    display: grid;
    gap: 2px;
    margin-top: 12px;
    border: 1px solid var(--border-media);
    border-radius: 16px;
    overflow: hidden;
  }
  .media img, .media video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    background: #f7f9f9;
  }
  .media.n1 img, .media.n1 video { max-height: 510px; height: auto; }
  .media.n2, .media.n3, .media.n4 { grid-template-columns: 1fr 1fr; }
  .media.n2 { grid-auto-rows: 285px; }
  .media.n3 { grid-auto-rows: 142px; }
  .media.n3 > :first-child { grid-row: span 2; }
  .media.n4 { grid-auto-rows: 142px; }

  /* quoted tweet */
  .quote {
    margin-top: 12px;
    border: 1px solid var(--border-media);
    border-radius: 16px;
    padding: 12px;
    overflow: hidden;
  }
  .quote:hover { background: var(--hover); }
  .quote .qhead {
    display: flex;
    align-items: center;
    gap: 4px;
    min-width: 0;
    font-size: 15px;
  }
  .quote .qhead img.qavatar {
    width: 20px; height: 20px; border-radius: 9999px; object-fit: cover;
    margin-right: 2px; flex: none; background: var(--chip-bg);
  }
  .quote .qhead .name { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .quote .qhead .handle { color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .quote .qbody {
    margin-top: 4px;
    white-space: pre-wrap;
    overflow-wrap: break-word;
    word-break: break-word;
    font-size: 15px;
  }
  .quote .media { margin-top: 8px; border-radius: 12px; }

  /* tags */
  .tagrow { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .pill {
    font-size: 12.5px;
    font-weight: 600;
    border-radius: 9999px;
    padding: 3px 10px;
    white-space: normal;
    overflow-wrap: break-word;
    word-break: break-word;
    max-width: 100%;
  }
  .pill .rmtag { cursor: pointer; margin-left: 3px; opacity: 0.55; font-weight: 700; }
  .pill .rmtag:hover { opacity: 1; }
  .pill.addtag {
    font: inherit;
    font-size: 12.5px;
    font-weight: 700;
    background: none;
    border: 1px dashed var(--border-media);
    color: var(--text-2);
    padding: 2px 9px;
    border-radius: 9999px;
    cursor: pointer;
    line-height: 1.4;
  }
  .pill.addtag:hover { color: var(--blue); border-color: var(--blue); }
  .taginput {
    font: inherit;
    font-size: 12.5px;
    font-weight: 600;
    border: 1px solid var(--blue);
    border-radius: 9999px;
    padding: 2px 10px;
    outline: none;
    width: 110px;
  }
  /* add-tag autocomplete (body-level, position:fixed) */
  .tagsuggest {
    position: fixed;
    z-index: 40;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(101, 119, 134, 0.2), 0 0 5px rgba(101, 119, 134, 0.15);
    padding: 5px 0;
    max-height: 240px;
    overflow-y: auto;
  }
  .tagsuggest .opt {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 12px;
    cursor: pointer;
  }
  .tagsuggest .opt.active, .tagsuggest .opt:hover { background: var(--hover); }
  .tagsuggest .opt .pill { font-size: 12.5px; font-weight: 600; padding: 2px 10px; }
  .tagsuggest .opt .cnt { margin-left: auto; color: var(--text-2); font-size: 12px; }
  body.selecting .pill.addtag, body.selecting .pill .rmtag { display: none; }

  /* action bar */
  .actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
    max-width: 425px;
    color: var(--text-2);
  }
  .act {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    color: var(--text-2);
  }
  .act svg { width: 18.75px; height: 18.75px; fill: currentColor; }
  .act.repost:hover { color: var(--green); }
  .act.like:hover { color: var(--pink); }
  .act.bm:hover, .act.reply:hover, .act.open:hover { color: var(--blue); }

  /* ---- multi-select mode ---- */
  .selcircle {
    display: none;
    width: 20px;
    height: 20px;
    border-radius: 9999px;
    border: 2px solid var(--border-media);
    flex: none;
    align-self: flex-start;
    margin-top: 10px;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 13px;
  }
  body.selecting .selcircle { display: flex; }
  body.selecting .del { display: none; }
  article.tweet.selected { background: rgba(29, 155, 240, 0.08); }
  article.tweet.selected .selcircle {
    background: var(--blue);
    border-color: var(--blue);
  }
  article.tweet.selected .selcircle::after { content: "✓"; }

  .selbar {
    display: none;
    position: sticky;
    bottom: 0;
    z-index: 20;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
  }
  body.selecting .selbar { display: flex; }
  .selbar .selcount { font-weight: 700; }
  .btn {
    font: inherit;
    font-size: 14px;
    font-weight: 700;
    border-radius: 9999px;
    padding: 8px 18px;
    cursor: pointer;
    border: 1px solid var(--border-media);
    background: #fff;
    color: var(--text);
  }
  .btn:hover { background: var(--hover); }
  .btn-danger {
    background: #f4212e;
    border-color: #f4212e;
    color: #fff;
    margin-left: auto;
  }
  .btn-danger:hover { background: #dc1e29; }
  .btn-danger:disabled { opacity: 0.5; cursor: default; }
  .restore { font-size: 13px; color: var(--blue); cursor: pointer; white-space: nowrap; }
  .restore:hover { text-decoration: underline; }

  .pill.deleted-x {
    background: rgba(244, 33, 46, 0.08);
    color: #f4212e;
    border: 1px solid rgba(244, 33, 46, 0.35);
  }
  #syncBtn[disabled] { opacity: 0.85; cursor: default; }
  #syncBtn .ring {
    width: 14px;
    height: 14px;
    vertical-align: -2px;
    margin-right: 6px;
    transform: rotate(-90deg);
  }
  #syncBtn .ring .track { fill: none; stroke: var(--border-media); stroke-width: 3; }
  #syncBtn .ring .arc {
    fill: none;
    stroke: var(--blue);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 50.27;      /* 2πr, r=8 */
    stroke-dashoffset: 50.27;
    transition: stroke-dashoffset 0.6s ease;
  }
  #syncBtn .ring.indeterminate { animation: spin 0.9s linear infinite; }
  #syncBtn .ring.indeterminate .arc { stroke-dashoffset: 37.7; } /* 25% arc */
  @keyframes spin { to { transform: rotate(270deg); } }

  .empty {
    padding: 60px 32px;
    text-align: center;
    color: var(--text-2);
  }
  .empty .big { font-size: 29px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
</style>

<div class="shell">
  <div class="topbar">
    <div class="title-row">
      <h1>Bookmarks</h1>
      <div class="sub"><span id="totalCount">0</span> saved</div>
    </div>
    <div class="controls">
      <div class="searchbox">
        <svg viewBox="0 0 24 24"><path d="M10.25 3.75c-3.59 0-6.5 2.91-6.5 6.5s2.91 6.5 6.5 6.5c1.795 0 3.419-.726 4.596-1.904 1.178-1.177 1.904-2.801 1.904-4.596 0-3.59-2.91-6.5-6.5-6.5zm-8.5 6.5c0-4.694 3.806-8.5 8.5-8.5s8.5 3.806 8.5 8.5c0 1.986-.682 3.815-1.824 5.262l4.781 4.781-1.414 1.414-4.781-4.781c-1.447 1.142-3.276 1.824-5.262 1.824-4.694 0-8.5-3.806-8.5-8.5z"/></svg>
        <input id="search" type="text" placeholder="Search bookmarks" autocomplete="off">
      </div>
      <details class="tagdrop" id="tagDropdown">
        <summary class="chip" id="tagSummary">Filter</summary>
        <div class="tagmenu" id="tagMenu"></div>
      </details>
      <select class="chip" id="sortKey">
        <option value="date">Latest</option>
        <option value="likes">Most liked</option>
        <option value="reposts">Most reposted</option>
        <option value="author">Author</option>
      </select>
      <button class="chip" id="sortDir" title="Toggle sort direction">↓</button>
      <button class="chip" id="selectToggle">Select</button>
      <button class="chip" id="manageTags" title="Delete or restore tags">Manage tags</button>
      <button class="chip" id="syncBtn" hidden>Sync</button>
      <span class="restore" id="restoreLink" hidden></span>
      <span class="shown"><span id="shownCount">0</span> shown</span>
    </div>
  </div>

  <div id="timeline"></div>

  <!-- Manage-tags modal: delete a tag from all posts, or restore a deleted one. -->
  <div id="tagManager" class="tm-backdrop" hidden>
    <div class="tm" role="dialog" aria-label="Manage tags" aria-modal="true">
      <div class="tm-head">
        <h2>Manage tags</h2>
        <button id="tmClose" class="tm-x" type="button" title="Close">×</button>
      </div>
      <p class="tm-note">Deleting a tag removes it from every post (the posts and your synced data are never touched). Restore it any time from the Deleted tab.</p>
      <div class="tm-tabs">
        <button id="tmTabActive" class="tm-tab" type="button">Active</button>
        <button id="tmTabDeleted" class="tm-tab" type="button">Deleted</button>
      </div>
      <input id="tmSearch" class="tm-search" type="text" autocomplete="off" placeholder="Search tags">
      <div id="tmSummary" class="tm-summary"></div>
      <div id="tmList" class="tm-list"></div>
    </div>
  </div>

  <div class="selbar">
    <span class="selcount"><span id="selCount">0</span> selected</span>
    <button class="btn" id="selAll">Select all</button>
    <button class="btn" id="selCancel">Cancel</button>
    <button class="btn btn-danger" id="selDelete" disabled>Delete</button>
  </div>
</div>

<script>
const DATA = /*__BOOKMARKS_DATA__*/[];

function loadHidden() {
  try {
    return new Set(JSON.parse(localStorage.getItem("hiddenBookmarks") || "[]"));
  } catch {
    return new Set();
  }
}

function loadCustomTags() {
  try {
    return JSON.parse(localStorage.getItem("customTags") || "{}");
  } catch {
    return {};
  }
}

function loadSavedFilters() {
  try {
    const v = JSON.parse(localStorage.getItem("savedFilters") || "[]");
    return Array.isArray(v) ? v : [];
  } catch {
    return [];
  }
}

// Per-post overlay suppressing specific tags (derived or custom) by name.
// LocalStorage-only, like hiddenBookmarks — the ft DB is never mutated, and
// derived tags that regenerate on the next sync stay suppressed by name.
function loadRemovedTags() {
  try {
    const v = JSON.parse(localStorage.getItem("removedTags") || "{}");
    return v && typeof v === "object" ? v : {};
  } catch {
    return {};
  }
}

// Tags deleted everywhere (from all posts at once). Also localStorage-only.
function loadGlobalRemovedTags() {
  try {
    const v = JSON.parse(localStorage.getItem("globalRemovedTags") || "[]");
    return new Set(Array.isArray(v) ? v.map(t => String(t).toLowerCase()) : []);
  } catch {
    return new Set();
  }
}

const state = {
  search: "",
  filterExpr: localStorage.getItem("filterExpr") || "",
  filterPred: null,           // compiled predicate for filterExpr (null = match all)
  savedFilters: loadSavedFilters(),
  sortKey: "date",
  sortDir: "desc",
  hidden: loadHidden(),
  customTags: loadCustomTags(),
  removedTags: loadRemovedTags(),
  globalRemovedTags: loadGlobalRemovedTags(),
  selecting: false,
  selected: new Set(),
  visibleIds: [],
};

function saveCustomTags() {
  localStorage.setItem("customTags", JSON.stringify(state.customTags));
}

function saveRemovedTags() {
  localStorage.setItem("removedTags", JSON.stringify(state.removedTags));
}

function saveGlobalRemovedTags() {
  localStorage.setItem("globalRemovedTags", JSON.stringify([...state.globalRemovedTags]));
}

// A bookmark's effective tags: derived (from the data) plus user-added.
function tagsOf(b) {
  const custom = state.customTags[b.id] || [];
  const all = custom.length ? b.tags.concat(custom) : b.tags;
  const perPost = state.removedTags[b.id];
  const global = state.globalRemovedTags;
  if ((!perPost || !perPost.length) && global.size === 0) return all;
  const rm = new Set((perPost || []).map(t => t.toLowerCase()));
  return all.filter(t => { const l = t.toLowerCase(); return !rm.has(l) && !global.has(l); });
}

function saveHidden() {
  localStorage.setItem("hiddenBookmarks", JSON.stringify([...state.hidden]));
  updateRestoreLink();
}

function updateRestoreLink() {
  const el = document.getElementById("restoreLink");
  el.hidden = state.hidden.size === 0;
  el.textContent = `Restore ${state.hidden.size} deleted`;
}

function escapeHtml(s) {
  return String(s)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

// Runs on already-escaped text: URLs, @mentions, #hashtags become links.
function linkify(escaped) {
  return escaped
    .replace(/(https?:\/\/[^\s&]+(?:&amp;[^\s&]+)*)/g,
      '<a href="$1" target="_blank" rel="noopener">$1</a>')
    .replace(/(^|[^\w/])@(\w{1,15})\b/g,
      '$1<a href="https://x.com/$2" target="_blank" rel="noopener">@$2</a>')
    .replace(/(^|\s)#(\w+)/g,
      '$1<a href="https://x.com/hashtag/$2" target="_blank" rel="noopener">#$2</a>');
}

function fmtCount(n) {
  if (n >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, "") + "M";
  if (n >= 1e3) return (n / 1e3).toFixed(1).replace(/\.0$/, "") + "K";
  return String(n);
}

function hueOf(s) {
  let hash = 0;
  const key = s.toLowerCase();
  for (let i = 0; i < key.length; i++) hash = (hash * 31 + key.charCodeAt(i)) | 0;
  return Math.abs(hash) % 360;
}

function pillStyle(tag) {
  const h = hueOf(tag);
  return `background: hsl(${h}, 80%, 94%); color: hsl(${h}, 70%, 32%);`;
}

function avatarHtml(b) {
  if (b.avatar) {
    return `<img class="avatar" src="${escapeHtml(b.avatar)}" loading="lazy" alt="">`;
  }
  const h = hueOf(b.handle || b.author || "?");
  const initial = (b.author || b.handle || "?").trim().charAt(0).toUpperCase();
  return `<div class="avatar-fallback" style="background: hsl(${h}, 55%, 55%)">${escapeHtml(initial)}</div>`;
}

function mediaGrid(media) {
  if (!media || !media.length) return "";
  const n = Math.min(media.length, 4);
  const items = media.map(m => m.type === "video"
    ? `<video src="${escapeHtml(m.src)}" controls preload="metadata" playsinline></video>`
    : `<img src="${escapeHtml(m.src)}" loading="lazy" alt="">`
  ).join("");
  return `<div class="media n${n}">${items}</div>`;
}

function quoteBlock(q) {
  if (!q) return "";
  const av = q.avatar
    ? `<img class="qavatar" src="${escapeHtml(q.avatar)}" loading="lazy" alt="">`
    : "";
  return `
    <div class="quote" data-url="${escapeHtml(q.url)}">
      <div class="qhead">
        ${av}
        <span class="name">${escapeHtml(q.author)}</span>
        <span class="handle">@${escapeHtml(q.handle)}</span>
      </div>
      ${q.text ? `<div class="qbody">${linkify(escapeHtml(q.text))}</div>` : ""}
      ${mediaGrid(q.media)}
    </div>`;
}

function replyLine(rp) {
  if (!rp) return "";
  return `<div class="replying">Replying to <a href="https://x.com/${encodeURIComponent(rp.handle)}" target="_blank" rel="noopener">@${escapeHtml(rp.handle)}</a></div>`;
}

const ICONS = {
  reply: '<svg viewBox="0 0 24 24"><path d="M1.751 10c0-4.42 3.584-8 8.005-8h4.366c4.49 0 8.129 3.64 8.129 8.13 0 2.96-1.607 5.68-4.196 7.11l-8.054 4.46v-3.69h-.067c-4.49.1-8.183-3.51-8.183-8.01zm8.005-6c-3.317 0-6.005 2.69-6.005 6 0 3.37 2.77 6.08 6.138 6.01l.351-.01h1.761v2.3l5.087-2.81c1.951-1.08 3.163-3.13 3.163-5.36 0-3.39-2.744-6.13-6.129-6.13H9.756z"/></svg>',
  repost: '<svg viewBox="0 0 24 24"><path d="M4.5 3.88l4.432 4.14-1.364 1.46L5.5 7.55V16c0 1.1.896 2 2 2H13v2H7.5c-2.209 0-4-1.79-4-4V7.55L1.432 9.48.068 8.02 4.5 3.88zM16.5 6H11V4h5.5c2.209 0 4 1.79 4 4v8.45l2.068-1.93 1.364 1.46-4.432 4.14-4.432-4.14 1.364-1.46 2.068 1.93V8c0-1.1-.896-2-2-2z"/></svg>',
  like: '<svg viewBox="0 0 24 24"><path d="M16.697 5.5c-1.222-.06-2.679.51-3.89 2.16l-.805 1.09-.806-1.09C9.984 6.01 8.526 5.44 7.304 5.5c-1.243.07-2.349.78-2.91 1.91-.552 1.12-.633 2.78.479 4.82 1.074 1.97 3.257 4.27 7.129 6.61 3.87-2.34 6.052-4.64 7.126-6.61 1.111-2.04 1.03-3.7.477-4.82-.561-1.13-1.666-1.84-2.908-1.91zm4.187 7.69c-1.351 2.48-4.001 5.12-8.379 7.67l-.503.3-.504-.3c-4.379-2.55-7.029-5.19-8.382-7.67-1.36-2.5-1.41-4.86-.514-6.67.887-1.79 2.647-2.91 4.601-3.01 1.651-.09 3.368.56 4.798 2.01 1.429-1.45 3.146-2.1 4.796-2.01 1.954.1 3.714 1.22 4.601 3.01.896 1.81.846 4.17-.514 6.67z"/></svg>',
  bookmark: '<svg viewBox="0 0 24 24"><path d="M4 4.5C4 3.12 5.119 2 6.5 2h11C18.881 2 20 3.12 20 4.5v18.44l-8-5.71-8 5.71V4.5zM6.5 4c-.276 0-.5.22-.5.5v14.56l6-4.29 6 4.29V4.5c0-.28-.224-.5-.5-.5h-11z"/></svg>',
  open: '<svg viewBox="0 0 24 24"><path d="M12 2.59l5.7 5.7-1.41 1.42L13 6.41V16h-2V6.41l-3.3 3.3-1.41-1.42L12 2.59zM21 15l-.02 3.51c0 1.38-1.12 2.49-2.5 2.49H5.5C4.11 21 3 19.88 3 18.5V15h2v3.5c0 .28.22.5.5.5h12.98c.28 0 .5-.22.5-.5L19 15h2z"/></svg>',
  trash: '<svg viewBox="0 0 24 24"><path d="M16 6V4.5C16 3.12 14.88 2 13.5 2h-3C9.11 2 8 3.12 8 4.5V6H3v2h1.06l.81 11.21C4.98 20.78 6.28 22 7.86 22h8.27c1.58 0 2.88-1.22 3-2.79L19.93 8H21V6h-5zm-6-1.5c0-.28.22-.5.5-.5h3c.27 0 .5.22.5.5V6h-4V4.5zm7.13 14.57c-.04.52-.47.93-1 .93H7.86c-.53 0-.96-.41-1-.93L6.07 8h11.85l-.79 11.07z"/></svg>',
};

// X collapses long posts behind a "Show more" link; ~560 chars or 8+ lines counts as long.
function bodyHtml(text) {
  if (!text) return "";
  const long = text.length > 560 || text.split("\n").length > 8;
  const body = `<div class="body${long ? " clamped" : ""}">${linkify(escapeHtml(text))}</div>`;
  return long ? body + `<span class="showmore">Show more</span>` : body;
}

// Tag pills for one bookmark: derived tags, then removable custom tags, then the "+" button.
// Extracted so a tag change can re-render just this row instead of the whole timeline.
function tagRowHtml(b) {
  const removed = new Set([...(state.removedTags[b.id] || []).map(t => t.toLowerCase()),
                           ...state.globalRemovedTags]);
  const rmBtn = `<span class="rmtag" title="Remove tag">×</span>`;
  const derived = b.tags.filter(t => !removed.has(t.toLowerCase())).map(t =>
    t.toLowerCase() === "deleted on x"
      ? `<span class="pill deleted-x" data-tag="${escapeHtml(t)}" data-kind="derived">Deleted on X${rmBtn}</span>`
      : `<span class="pill" style="${pillStyle(t)}" data-tag="${escapeHtml(t)}" data-kind="derived">${escapeHtml(t)}${rmBtn}</span>`).join("");
  const custom = (state.customTags[b.id] || []).filter(t => !removed.has(t.toLowerCase())).map(t =>
    `<span class="pill" style="${pillStyle(t)}" data-tag="${escapeHtml(t)}" data-kind="custom">${escapeHtml(t)}${rmBtn}</span>`).join("");
  return derived + custom + `<button class="pill addtag" type="button" title="Add tag">+</button>`;
}

function tweetHtml(b) {
  return `
    <article class="tweet" data-id="${escapeHtml(b.id)}" data-url="${escapeHtml(b.url)}">
      <div class="selcircle"></div>
      ${avatarHtml(b)}
      <div class="content">
        <div class="head">
          <a class="name" href="https://x.com/${encodeURIComponent(b.handle)}" target="_blank" rel="noopener" style="color: var(--text);">${escapeHtml(b.author)}</a>
          <span class="handle">@${escapeHtml(b.handle)}</span>
          <span class="dot">·</span>
          <a class="time" href="${escapeHtml(b.url)}" target="_blank" rel="noopener">${escapeHtml(b.dateDisplay)}</a>
          <button class="del" type="button" title="Remove from view">${ICONS.trash}</button>
        </div>
        ${replyLine(b.replyParent)}
        ${bodyHtml(b.text)}
        ${mediaGrid(b.media)}
        ${quoteBlock(b.quoted)}
        <div class="tagrow">${tagRowHtml(b)}</div>
        <div class="actions">
          <span class="act reply">${ICONS.reply}</span>
          <span class="act repost">${ICONS.repost}<span>${fmtCount(b.reposts)}</span></span>
          <span class="act like">${ICONS.like}<span>${fmtCount(b.likes)}</span></span>
          <span class="act bm">${ICONS.bookmark}<span>${fmtCount(b.bookmarks)}</span></span>
          <span class="act open">${ICONS.open}</span>
        </div>
      </div>
    </article>`;
}

// --- Persistent keyed card cache ---------------------------------------------
// Each bookmark's <article> is built from HTML exactly once and kept forever.
// Filtering/sorting/searching only *moves* these existing nodes in and out of
// the timeline — appending an already-live node relocates it, it does not clone
// or reload it — so avatars, images and videos load once and never again.
// Combined with `content-visibility: auto`, off-screen cards cost ~nothing to
// keep around, so this beats windowing while being far simpler and bug-free.

const cardCache = new Map();   // id -> <article>
const byId = new Map(DATA.map(b => [b.id, b]));
const _builder = document.createElement("template");

function getCard(b) {
  let el = cardCache.get(b.id);
  if (!el) {
    _builder.innerHTML = tweetHtml(b);            // parse this one card, once
    el = _builder.content.firstElementChild;
    cardCache.set(b.id, el);
  }
  return el;
}

let _emptyEl = null;
function emptyEl() {
  if (!_emptyEl) {
    _emptyEl = document.createElement("div");
    _emptyEl.className = "empty";
    _emptyEl.innerHTML = `<div class="big">No bookmarks found</div>Try a different search or clear your tag filters.`;
  }
  return _emptyEl;
}

function render(rows) {
  const timeline = document.getElementById("timeline");
  if (!rows.length) {
    timeline.replaceChildren(emptyEl());
  } else {
    // replaceChildren relocates cached nodes into the new order in one shot.
    timeline.replaceChildren(...rows.map(getCard));
    if (state.selecting) {
      for (const a of timeline.children) a.classList.toggle("selected", state.selected.has(a.dataset.id));
    }
  }
  setShownCount(rows.length);
  state.visibleIds = rows.map(b => b.id);
}

// Precomputed, lowercased search text per bookmark (excludes tags, which mutate).
function haystack(b) {
  if (b._hay === undefined) {
    b._hay = [b.text, b.author, "@" + b.handle, b.quoted && b.quoted.text]
      .filter(Boolean).join("\n").toLowerCase();
  }
  return b._hay;
}

// Does this bookmark pass the current hidden/tag/search filters? Shared by the
// full re-render (applyState) and the surgical updates so they never disagree.
// --- Boolean tag-filter expression: `and` / `or` / `not` / parentheses over
// tag names (bare, or "quoted" for names with spaces). Compiles the string to
// a predicate over a bookmark's lowercased tag Set. Empty string = match all. ---
function tokenizeFilter(src) {
  const toks = [];
  let i = 0;
  const space = c => c === " " || c === "\t" || c === "\n";
  const stop = c => space(c) || "()&|!\"'".includes(c);
  while (i < src.length) {
    const c = src[i];
    if (space(c)) { i++; continue; }
    if (c === "(") { toks.push({ t: "(" }); i++; continue; }
    if (c === ")") { toks.push({ t: ")" }); i++; continue; }
    if (c === "!") { toks.push({ t: "not" }); i++; continue; }
    if (c === "&") { i++; if (src[i] === "&") i++; toks.push({ t: "and" }); continue; }
    if (c === "|") { i++; if (src[i] === "|") i++; toks.push({ t: "or" }); continue; }
    if (c === '"' || c === "'") {
      const q = c; i++; let s = "";
      while (i < src.length && src[i] !== q) s += src[i++];
      if (i >= src.length) throw new Error("unclosed quote");
      i++; toks.push({ t: "tag", v: s.toLowerCase() }); continue;
    }
    let s = "";
    while (i < src.length && !stop(src[i])) s += src[i++];
    const low = s.toLowerCase();
    if (low === "and") toks.push({ t: "and" });
    else if (low === "or") toks.push({ t: "or" });
    else if (low === "not") toks.push({ t: "not" });
    else toks.push({ t: "tag", v: low });
  }
  return toks;
}

function parseFilter(src) {
  const toks = tokenizeFilter(src);
  let p = 0;
  const peek = () => toks[p];
  const atomStart = tk => tk && (tk.t === "tag" || tk.t === "(" || tk.t === "not");
  function pOr() {
    let n = pAnd();
    while (peek() && peek().t === "or") { p++; const r = pAnd(), l = n; n = s => l(s) || r(s); }
    return n;
  }
  function pAnd() {
    let n = pNot();
    // explicit `and`, or two adjacent atoms => implicit AND
    while (peek() && (peek().t === "and" || atomStart(peek()))) {
      if (peek().t === "and") p++;
      const r = pNot(), l = n; n = s => l(s) && r(s);
    }
    return n;
  }
  function pNot() {
    if (peek() && peek().t === "not") { p++; const r = pNot(); return s => !r(s); }
    return pAtom();
  }
  function pAtom() {
    const tk = peek();
    if (!tk) throw new Error("unexpected end of filter");
    if (tk.t === "(") {
      p++; const n = pOr();
      if (!peek() || peek().t !== ")") throw new Error("missing )");
      p++; return n;
    }
    if (tk.t === "tag") { p++; return s => s.has(tk.v); }
    throw new Error("unexpected '" + tk.t + "'");
  }
  const n = pOr();
  if (p < toks.length) throw new Error("unexpected '" + peek().t + "'");
  return n;
}

function compileFilter(expr) {
  const s = (expr || "").trim();
  if (!s) return { pred: null, ok: true };
  try { return { pred: parseFilter(s), ok: true }; }
  catch (e) { return { pred: null, ok: false, error: e.message }; }
}

function matchesFilters(b) {
  if (state.hidden.has(b.id)) return false;
  if (state.filterPred && !state.filterPred(new Set(tagsOf(b).map(t => t.toLowerCase())))) return false;
  if (state.search) {
    const q = state.search;
    return haystack(b).includes(q) || tagsOf(b).some(t => t.toLowerCase().includes(q));
  }
  return true;
}

function applyState() {
  const dir = state.sortDir === "asc" ? 1 : -1;
  const key = state.sortKey;
  const rows = DATA.filter(matchesFilters).sort((a, b) => {
    if (key === "author") return dir * (a.author || "").localeCompare(b.author || "");
    if (key === "likes") return dir * (a.likes - b.likes);
    if (key === "reposts") return dir * (a.reposts - b.reposts);
    return dir * (a.ts - b.ts);
  });
  render(rows);
}

// --- Surgical DOM updates: touch only the affected card so a delete or a tag
// change never rebuilds (and reloads the media of) all ~500 tweets. ---

function setShownCount(n) {
  document.getElementById("shownCount").textContent = n.toLocaleString();
}

// Re-render just one card's tag pills after an add/remove.
function refreshTagRow(id) {
  const b = byId.get(id);
  const art = cardCache.get(id);
  if (b && art) art.querySelector(".tagrow").innerHTML = tagRowHtml(b);
}

// Re-render every built card's tag pills in place (no node/media rebuild) —
// used when a global tag change affects many cards at once.
function refreshAllTagRows() {
  for (const [id, art] of cardCache) {
    const b = byId.get(id);
    if (b) art.querySelector(".tagrow").innerHTML = tagRowHtml(b);
  }
}

// Drop a card from the DOM without rebuilding the rest; keep visibleIds/count in sync.
function removeArticle(art) {
  const id = art.dataset.id;
  art.remove();
  const i = state.visibleIds.indexOf(id);
  if (i !== -1) state.visibleIds.splice(i, 1);
  setShownCount(state.visibleIds.length);
  if (!state.visibleIds.length) applyState();  // fall back to the empty-state view
}

// Every tag currently in use (derived + custom), most-frequent first.
// Shared by the filter dropdown and the add-tag autocomplete.
function tagCountsSorted() {
  const counts = new Map();
  for (const b of DATA) {
    for (const t of tagsOf(b)) {
      const key = t.toLowerCase();
      const cur = counts.get(key) || { label: t, n: 0 };
      cur.n += 1;
      counts.set(key, cur);
    }
  }
  return [...counts.entries()].sort((a, b) => b[1].n - a[1].n);
}

// Build the whole filter dropdown: an editable boolean expression, a save row,
// the saved-filter chips, and a click-to-insert tag palette (+ include, − exclude).
function buildTagOptions() {
  const sorted = tagCountsSorted();
  const menu = document.getElementById("tagMenu");
  menu.innerHTML = `
    <div class="fbar">
      <input id="filterExpr" class="fexpr" type="text" autocomplete="off" spellcheck="false"
             placeholder="e.g. media and not archive">
      <button id="filterClear" class="fx" type="button" title="Clear filter">×</button>
    </div>
    <div id="filterErr" class="ferr" hidden></div>
    <div class="fsave">
      <input id="filterName" class="fname" type="text" autocomplete="off" placeholder="name this filter">
      <button id="filterSaveBtn" class="fsavebtn" type="button">Save</button>
    </div>
    <div id="savedRow" class="saved" hidden></div>
    <div class="fdiv">Tags — <b>+</b> include, <b>−</b> exclude</div>
    <div class="palette">
      ${sorted.map(([key, { label, n }]) => `
        <div class="prow" data-tag="${escapeHtml(key)}">
          <button class="pbtn add" type="button" title="include in filter">+</button>
          <button class="pbtn ex" type="button" title="exclude in filter">−</button>
          <span class="pname">${escapeHtml(label)}</span>
          <span class="cnt">${n}</span>
        </div>`).join("")}
    </div>`;
  wireFilterMenu();
}

function wireFilterMenu() {
  const expr = document.getElementById("filterExpr");
  expr.value = state.filterExpr;
  let t;
  expr.addEventListener("input", () => {
    clearTimeout(t);
    t = setTimeout(() => setFilterExpr(expr.value), 150);
  });
  expr.addEventListener("keydown", e => {
    e.stopPropagation();
    if (e.key === "Enter") { clearTimeout(t); setFilterExpr(expr.value); }
  });
  document.getElementById("filterClear").addEventListener("click", () => {
    expr.value = "";
    setFilterExpr("");
    expr.focus();
  });
  document.getElementById("filterSaveBtn").addEventListener("click", saveCurrentFilter);
  document.getElementById("filterName").addEventListener("keydown", e => {
    e.stopPropagation();
    if (e.key === "Enter") saveCurrentFilter();
  });
  document.getElementById("tagMenu").querySelectorAll(".prow").forEach(row => {
    const tag = row.dataset.tag;
    row.querySelector(".add").addEventListener("click", () => insertTag(tag, false));
    row.querySelector(".ex").addEventListener("click", () => insertTag(tag, true));
  });
  renderSavedFilters();
}

// A global tag delete/restore only changes which tags are suppressed; push that
// change to every card's pills, the filter palette, and the timeline. Posts and
// the ft DB are never modified. Reversible from the Manage-tags modal.
function applyGlobalTagChange() {
  saveGlobalRemovedTags();
  refreshAllTagRows();   // strip/re-add the tag on every card's pills, no media reload
  buildTagOptions();     // keep the filter palette counts in sync
  applyState();          // re-filter (an active filter may reference the tag)
}

function removeTagGlobally(tagKey) {
  state.globalRemovedTags.add(tagKey.toLowerCase());
  applyGlobalTagChange();
}

function restoreTagGlobally(tagKey) {
  state.globalRemovedTags.delete(tagKey.toLowerCase());
  applyGlobalTagChange();
}

// Every tag's post count, INCLUDING globally-deleted ones (so the manager can
// show what a restore brings back). Per-post removals still count against it.
function tagInventory() {
  const counts = new Map();
  for (const b of DATA) {
    const perPost = new Set((state.removedTags[b.id] || []).map(t => t.toLowerCase()));
    const all = state.customTags[b.id]?.length ? b.tags.concat(state.customTags[b.id]) : b.tags;
    const seen = new Set();
    for (const t of all) {
      const k = t.toLowerCase();
      if (perPost.has(k) || seen.has(k)) continue;
      seen.add(k);
      const cur = counts.get(k) || { label: t, n: 0 };
      cur.n += 1;
      counts.set(k, cur);
    }
  }
  return [...counts.entries()].sort((a, b) => b[1].n - a[1].n);
}

// --- Manage-tags modal (two tabs: Active tags to delete, Deleted tags to restore) ---
let tmTab = "active";

function openTagManager() {
  tmTab = "active";
  document.getElementById("tmSearch").value = "";
  renderTagManager();
  const bd = document.getElementById("tagManager");
  bd.hidden = false;
  document.getElementById("tmSearch").focus();
}

function closeTagManager() {
  document.getElementById("tagManager").hidden = true;
}

function setTagManagerTab(tab) {
  tmTab = tab;
  renderTagManager();
}

function renderTagManager() {
  const q = (document.getElementById("tmSearch").value || "").trim().toLowerCase();
  const inv = tagInventory();
  const active = inv.filter(([key]) => !state.globalRemovedTags.has(key));
  const deleted = inv.filter(([key]) => state.globalRemovedTags.has(key));

  document.getElementById("tmTabActive").textContent = `Active (${active.length})`;
  document.getElementById("tmTabDeleted").textContent = `Deleted (${deleted.length})`;
  document.getElementById("tmTabActive").classList.toggle("on", tmTab === "active");
  document.getElementById("tmTabDeleted").classList.toggle("on", tmTab === "deleted");

  const base = tmTab === "deleted" ? deleted : active;
  const rows = base.filter(([key, { label }]) =>
    !q || key.includes(q) || label.toLowerCase().includes(q));

  document.getElementById("tmSummary").textContent =
    q ? `${rows.length} of ${base.length} shown` : `${base.length} ${tmTab} tag${base.length === 1 ? "" : "s"}`;

  const list = document.getElementById("tmList");
  if (!rows.length) {
    const msg = q
      ? `No ${tmTab} tags match “${escapeHtml(q)}”.`
      : (tmTab === "deleted" ? "No deleted tags. Delete one from the Active tab." : "No tags.");
    list.innerHTML = `<div class="tm-empty">${msg}</div>`;
    return;
  }
  list.innerHTML = rows.map(([key, { label, n }]) => {
    const isDeleted = tmTab === "deleted";
    return `<div class="tm-row${isDeleted ? " deleted" : ""}" data-tag="${escapeHtml(key)}">
      <span class="tm-pill" style="${pillStyle(label)}">${escapeHtml(label)}</span>
      <span class="tm-cnt">${n} post${n === 1 ? "" : "s"}</span>
      ${isDeleted
        ? `<button class="tm-act restore" type="button">Restore</button>`
        : `<button class="tm-act delete" type="button">Delete</button>`}
    </div>`;
  }).join("");
  list.querySelectorAll(".tm-row").forEach(row => {
    const tag = row.dataset.tag;
    const btn = row.querySelector(".tm-act");
    btn.addEventListener("click", () => {
      if (btn.classList.contains("delete")) removeTagGlobally(tag);
      else restoreTagGlobally(tag);
      renderTagManager();  // the tag leaves this tab; stay put, modal open
    });
  });
}

// Compile the expression; on success filter + persist, on error just flag the
// input and keep the last valid results (so mid-typing never blanks the list).
function setFilterExpr(value) {
  state.filterExpr = value;
  const { pred, ok, error } = compileFilter(value);
  const input = document.getElementById("filterExpr");
  const err = document.getElementById("filterErr");
  if (ok) {
    state.filterPred = pred;
    if (input) input.classList.remove("bad");
    if (err) err.hidden = true;
    localStorage.setItem("filterExpr", value);
    updateTagSummary();
    applyState();
  } else {
    if (input) input.classList.add("bad");
    if (err) { err.hidden = false; err.textContent = error; }
  }
}

// Append a tag to the expression (AND-ed); quote names with spaces/specials.
function insertTag(tag, negate) {
  const input = document.getElementById("filterExpr");
  const token = (negate ? "not " : "") + (/[\s()&|!"']/.test(tag) ? `"${tag}"` : tag);
  const cur = (input.value || "").trim();
  input.value = cur ? `${cur} and ${token}` : token;
  setFilterExpr(input.value);
  input.focus();
}

function saveSavedFilters() {
  localStorage.setItem("savedFilters", JSON.stringify(state.savedFilters));
}

function saveCurrentFilter() {
  const nameInput = document.getElementById("filterName");
  const name = (nameInput.value || "").trim();
  const expr = (state.filterExpr || "").trim();
  if (!name || !expr) return;
  const existing = state.savedFilters.find(f => f.name.toLowerCase() === name.toLowerCase());
  if (existing) existing.expr = expr;
  else state.savedFilters.push({ name, expr });
  saveSavedFilters();
  nameInput.value = "";
  renderSavedFilters();
}

function renderSavedFilters() {
  const row = document.getElementById("savedRow");
  if (!row) return;
  if (!state.savedFilters.length) { row.hidden = true; row.innerHTML = ""; return; }
  row.hidden = false;
  row.innerHTML = state.savedFilters.map((f, i) => `
    <span class="sf" data-i="${i}">
      <button class="sfapply" type="button" title="${escapeHtml(f.expr)}">${escapeHtml(f.name)}</button>
      <button class="sfdel" type="button" title="delete">×</button>
    </span>`).join("");
  row.querySelectorAll(".sf").forEach(el => {
    const i = +el.dataset.i;
    el.querySelector(".sfapply").addEventListener("click", () => {
      const input = document.getElementById("filterExpr");
      input.value = state.savedFilters[i].expr;
      setFilterExpr(input.value);
    });
    el.querySelector(".sfdel").addEventListener("click", () => {
      state.savedFilters.splice(i, 1);
      saveSavedFilters();
      renderSavedFilters();
    });
  });
}

function updateTagSummary() {
  const el = document.getElementById("tagSummary");
  const s = (state.filterExpr || "").trim();
  if (!s) { el.textContent = "Filter"; el.classList.remove("on"); return; }
  el.textContent = s.length > 22 ? s.slice(0, 21) + "…" : s;
  el.classList.add("on");
}

function updateSelBar() {
  document.getElementById("selCount").textContent = state.selected.size;
  document.getElementById("selDelete").disabled = state.selected.size === 0;
  const allSelected = state.visibleIds.length > 0 &&
    state.visibleIds.every(id => state.selected.has(id));
  document.getElementById("selAll").textContent = allSelected ? "Deselect all" : "Select all";
}

function beginAddTag(btn) {
  const id = btn.closest("article").dataset.id;
  const own = new Set(tagsOf(byId.get(id)).map(t => t.toLowerCase()));
  // Existing tags this bookmark doesn't already have, most-used first.
  const pool = tagCountsSorted()
    .map(([key, { label, n }]) => ({ key, label, n }))
    .filter(t => !own.has(t.key));

  const input = document.createElement("input");
  input.className = "taginput";
  input.placeholder = "new tag";
  input.autocomplete = "off";
  btn.replaceWith(input);
  input.focus();

  // The suggestion menu lives on <body> with position:fixed so the card's
  // `content-visibility` paint containment can never clip it.
  const menu = document.createElement("div");
  menu.className = "tagsuggest";
  document.body.appendChild(menu);

  let matches = [], active = -1, done = false;

  const positionMenu = () => {
    const r = input.getBoundingClientRect();
    menu.style.minWidth = Math.max(r.width, 170) + "px";
    menu.style.left = Math.round(Math.min(r.left, innerWidth - menu.offsetWidth - 8)) + "px";
    const h = menu.offsetHeight;
    const below = r.bottom + 4;
    menu.style.top = Math.round(below + h > innerHeight ? Math.max(8, r.top - h - 4) : below) + "px";
  };

  const highlight = () =>
    [...menu.children].forEach((el, i) => el.classList.toggle("active", i === active));

  const renderMenu = () => {
    const q = input.value.trim().toLowerCase();
    matches = (q ? pool.filter(t => t.key.includes(q)) : pool).slice(0, 8);
    active = -1;
    if (!matches.length) { menu.style.display = "none"; return; }
    menu.style.display = "";
    menu.innerHTML = matches.map((t, i) =>
      `<div class="opt" data-i="${i}"><span class="pill" style="${pillStyle(t.label)}">${escapeHtml(t.label)}</span><span class="cnt">${t.n}</span></div>`
    ).join("");
    positionMenu();
  };

  const finish = (commit, valOverride) => {
    if (done) return;
    done = true;
    menu.remove();
    window.removeEventListener("scroll", onScroll, true);
    const val = (valOverride != null ? valOverride : (input.value || "").trim());
    if (commit && val && !own.has(val.toLowerCase())) {
      const low = val.toLowerCase();
      const removed = state.removedTags[id] || [];
      if (removed.some(t => t.toLowerCase() === low)) {
        // Re-adding a tag that was removed: just un-suppress it (keeps a
        // derived tag derived instead of duplicating it as a custom tag).
        state.removedTags[id] = removed.filter(t => t.toLowerCase() !== low);
        if (!state.removedTags[id].length) delete state.removedTags[id];
        saveRemovedTags();
      } else {
        state.customTags[id] = (state.customTags[id] || []).concat(val);
        saveCustomTags();
      }
      buildTagOptions();
    }
    refreshTagRow(id);  // redraw just this card's pills (also restores the "+" on cancel)
  };

  const onScroll = () => { if (!done) finish(true); };  // commit & close if the page scrolls

  input.addEventListener("input", renderMenu);
  input.addEventListener("keydown", e => {
    e.stopPropagation();
    if (e.key === "Enter") {
      finish(true, active >= 0 ? matches[active].label : undefined);
    } else if (e.key === "Escape") {
      if (menu.style.display !== "none") menu.style.display = "none";  // 1st Esc: close menu
      else finish(false);                                             // 2nd Esc: cancel add
    } else if (e.key === "ArrowDown" && matches.length) {
      e.preventDefault(); active = (active + 1) % matches.length; highlight();
    } else if (e.key === "ArrowUp" && matches.length) {
      e.preventDefault(); active = (active - 1 + matches.length) % matches.length; highlight();
    }
  });
  input.addEventListener("click", e => e.stopPropagation());
  // mousedown (fires before the input's blur) so picking a suggestion commits cleanly.
  menu.addEventListener("mousedown", e => {
    const opt = e.target.closest(".opt");
    if (!opt) return;
    e.preventDefault();
    finish(true, matches[+opt.dataset.i].label);
  });
  input.addEventListener("blur", () => finish(true));
  window.addEventListener("scroll", onScroll, true);

  renderMenu();  // show existing tags immediately on open
}

function setSelecting(on) {
  state.selecting = on;
  state.selected.clear();
  document.body.classList.toggle("selecting", on);
  document.getElementById("selectToggle").textContent = on ? "Done" : "Select";
  document.querySelectorAll("article.tweet.selected").forEach(a => a.classList.remove("selected"));
  updateSelBar();
}

// One delegated click handler: selection, delete button, quote card, or whole-tweet open.
document.getElementById("timeline").addEventListener("click", e => {
  if (state.selecting) {
    const card = e.target.closest("article.tweet");
    if (!card) return;
    e.preventDefault();
    const id = card.dataset.id;
    if (state.selected.has(id)) {
      state.selected.delete(id);
      card.classList.remove("selected");
    } else {
      state.selected.add(id);
      card.classList.add("selected");
    }
    updateSelBar();
    return;
  }
  const del = e.target.closest(".del");
  if (del) {
    e.stopPropagation();
    const art = del.closest("article");
    state.hidden.add(art.dataset.id);
    saveHidden();
    removeArticle(art);
    return;
  }
  const rm = e.target.closest(".rmtag");
  if (rm) {
    e.stopPropagation();
    const pill = rm.closest(".pill");
    const art = pill.closest("article");
    const id = art.dataset.id;
    const tag = pill.dataset.tag;
    if (pill.dataset.kind === "custom") {
      // User-added tag: drop it outright so re-adding starts clean.
      state.customTags[id] = (state.customTags[id] || []).filter(t => t !== tag);
      if (!state.customTags[id].length) delete state.customTags[id];
      saveCustomTags();
    } else {
      // Derived tag: can't touch the DB, so suppress it via the overlay.
      state.removedTags[id] = (state.removedTags[id] || []).concat(tag);
      saveRemovedTags();
    }
    buildTagOptions();
    // Removing a tag can drop the card out of an active tag filter; otherwise just redraw its pills.
    if (matchesFilters(byId.get(id))) refreshTagRow(id);
    else removeArticle(art);
    return;
  }
  const add = e.target.closest(".addtag");
  if (add) {
    e.stopPropagation();
    beginAddTag(add);
    return;
  }
  if (e.target.closest(".taginput")) return;
  const more = e.target.closest(".showmore");
  if (more) {
    e.stopPropagation();
    const body = more.previousElementSibling;
    const clamped = body.classList.toggle("clamped");
    more.textContent = clamped ? "Show more" : "Show less";
    return;
  }
  if (e.target.closest("a") || e.target.tagName === "VIDEO") return;
  const quote = e.target.closest(".quote");
  if (quote && quote.dataset.url) {
    e.stopPropagation();
    window.open(quote.dataset.url, "_blank", "noopener");
    return;
  }
  const card = e.target.closest("article.tweet");
  if (card) window.open(card.dataset.url, "_blank", "noopener");
});

// Debounce so typing doesn't re-filter+re-render on every keystroke.
let searchTimer;
document.getElementById("search").addEventListener("input", e => {
  const v = e.target.value.trim().toLowerCase();
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { state.search = v; applyState(); }, 120);
});
document.getElementById("sortKey").addEventListener("change", e => {
  state.sortKey = e.target.value;
  applyState();
});
document.getElementById("sortDir").addEventListener("click", () => {
  state.sortDir = state.sortDir === "desc" ? "asc" : "desc";
  document.getElementById("sortDir").textContent = state.sortDir === "desc" ? "↓" : "↑";
  applyState();
});
document.getElementById("selectToggle").addEventListener("click", () => setSelecting(!state.selecting));
document.getElementById("manageTags").addEventListener("click", openTagManager);
document.getElementById("tmClose").addEventListener("click", closeTagManager);
document.getElementById("tmTabActive").addEventListener("click", () => setTagManagerTab("active"));
document.getElementById("tmTabDeleted").addEventListener("click", () => setTagManagerTab("deleted"));
document.getElementById("tmSearch").addEventListener("input", renderTagManager);
document.getElementById("tmSearch").addEventListener("keydown", e => {
  if (e.key === "Escape") { closeTagManager(); return; }
  e.stopPropagation();
});
document.getElementById("tagManager").addEventListener("click", e => {
  if (e.target.id === "tagManager") closeTagManager();  // click the dim backdrop to close
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape" && !document.getElementById("tagManager").hidden) closeTagManager();
});
document.getElementById("selAll").addEventListener("click", () => {
  const allSelected = state.visibleIds.length > 0 &&
    state.visibleIds.every(id => state.selected.has(id));
  if (allSelected) state.selected.clear();
  else state.visibleIds.forEach(id => state.selected.add(id));
  document.querySelectorAll("article.tweet").forEach(a =>
    a.classList.toggle("selected", state.selected.has(a.dataset.id)));
  updateSelBar();
});
document.getElementById("selCancel").addEventListener("click", () => setSelecting(false));
document.getElementById("selDelete").addEventListener("click", () => {
  const gone = state.selected;
  gone.forEach(id => state.hidden.add(id));
  saveHidden();
  // Remove the selected cards in place rather than rebuilding the whole timeline.
  for (const a of [...document.querySelectorAll("article.tweet.selected")]) a.remove();
  state.visibleIds = state.visibleIds.filter(id => !gone.has(id));
  setShownCount(state.visibleIds.length);
  setSelecting(false);
  if (!state.visibleIds.length) applyState();  // fall back to the empty-state view
});
document.getElementById("restoreLink").addEventListener("click", () => {
  state.hidden.clear();
  saveHidden();
  applyState();
});

// Sync only works when served by serve.py (a file:// page can't run ft).
// The server kicks the sync off in the background and we poll its status:
// a rebuild crawl takes minutes, far past browser fetch timeouts.
const syncBtn = document.getElementById("syncBtn");
if (location.protocol.startsWith("http")) syncBtn.hidden = false;

const RING_C = 50.27; // circumference matching the CSS dasharray

function syncSpinnerOn(progress) {
  syncBtn.disabled = true;
  const pct = progress == null ? null : Math.min(99, Math.round(progress * 100));
  syncBtn.innerHTML =
    `<svg class="ring${pct == null ? " indeterminate" : ""}" viewBox="0 0 20 20">` +
    `<circle class="track" cx="10" cy="10" r="8"></circle>` +
    `<circle class="arc" cx="10" cy="10" r="8" style="stroke-dashoffset:${
      pct == null ? "" : RING_C * (1 - pct / 100)
    }"></circle></svg>Syncing${pct == null ? "…" : " " + pct + "%"}`;
}

function syncSpinnerOff() {
  syncBtn.disabled = false;
  syncBtn.textContent = "Sync";
}

async function pollSync() {
  try {
    const res = await fetch("/sync-status");
    const st = await res.json();
    if (st.running) {
      syncSpinnerOn(st.progress);
      setTimeout(pollSync, 2000);
      return;
    }
    if (st.result && st.result.ok) {
      location.reload();
      return;
    }
    if (st.result) {
      alert("Sync failed: " + (st.result.error || "unknown error") +
        "\n\n" + (st.result.log || ""));
    }
  } catch {
    // server briefly unreachable (e.g. regenerating) — keep polling
    setTimeout(pollSync, 2000);
    return;
  }
  syncSpinnerOff();
}

async function startSync(force, full) {
  syncSpinnerOn(null);
  try {
    const params = [force && "force=1", full && "mode=full"].filter(Boolean).join("&");
    const res = await fetch("/sync" + (params ? "?" + params : ""), { method: "POST" });
    const out = await res.json();
    if (out.skipped) {          // synced recently — nothing to do
      syncSpinnerOff();
      return;
    }
    setTimeout(pollSync, 1500);
  } catch (err) {
    alert("Sync failed: " + err);
    syncSpinnerOff();
  }
}

syncBtn.title = "Sync new bookmarks (Shift-click: full re-crawl)";
syncBtn.addEventListener("click", e => startSync(true, e.shiftKey));

// Auto-sync on open: kick off a background sync (the server skips it if the
// last one was <10 min ago); if one is already running, just show it.
if (!syncBtn.hidden) {
  fetch("/sync-status").then(r => r.json()).then(st => {
    if (st.running) {
      syncSpinnerOn(st.progress);
      setTimeout(pollSync, 2000);
    } else {
      startSync(false);
    }
  }).catch(() => {});
}

// close tag dropdown when clicking outside
document.addEventListener("click", e => {
  const dd = document.getElementById("tagDropdown");
  if (!dd.open) return;
  // A click on a control inside the menu that re-rendered itself (e.g. delete
  // or restore a tag) leaves e.target detached; that's not an outside click, so
  // don't close the menu.
  if (!e.target.isConnected) return;
  if (!dd.contains(e.target)) dd.open = false;
});

document.getElementById("totalCount").textContent = DATA.length.toLocaleString();
buildTagOptions();
updateRestoreLink();
setFilterExpr(state.filterExpr);  // compile any saved expression, then render
</script>
